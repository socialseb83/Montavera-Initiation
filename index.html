<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Montavera Initiation Protocol</title>
    <style>
        :root { --p: #7B2CBF; --b: #0D1B2A; --t: #E0E1DD; --g: #00FF9F; }
        body { background: var(--b); color: var(--t); font-family: 'Courier New', Courier, monospace; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; overflow-y: auto; }
        #splash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--b); z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        #game { width: 90%; max-width: 400px; border: 1px solid var(--p); padding: 20px; background: rgba(13, 27, 42, 0.95); box-shadow: 0 0 15px rgba(123, 44, 191, 0.3); display: none; }
        #art { width: 100%; height: 220px; background-size: cover; background-position: center; border: 1px solid var(--p); margin-bottom: 15px; background-color: #000; }
        #txt { min-height: 120px; line-height: 1.4; white-space: pre-wrap; margin-bottom: 20px; }
        .btn { display: block; width: 100%; padding: 15px; margin: 10px 0; background: transparent; border: 1px solid var(--p); color: var(--t); font-family: inherit; cursor: pointer; text-align: left; }
        .btn:hover { background: rgba(123, 44, 191, 0.3); color: #fff; }
        #boot-btn { border-color: var(--g); color: var(--g); text-align: center; max-width: 200px; }
    </style>
</head>
<body>

<div id="splash">
    <p style="color: var(--g); margin-bottom: 30px;">[ MON TAVERA : INITIATION ]<br>SYSTEM STATUS: OFFLINE</p>
    <button id="boot-btn" class="btn" onclick="bootSystem()">INITIALIZE BOOT</button>
</div>

<audio id="bgm" loop preload="auto">
    <source src="welcome_to_montavera.mp3" type="audio/mpeg">
</audio>

<div id="game">
    <div id="art"></div>
    <div id="txt"></div>
    <div id="btns"></div>
</div>

<script>
    const DISCORD = 'https://discord.gg/sHSN5ke62F'; 
    const splash = document.getElementById('splash');
    const game = document.getElementById('game');
    const art = document.getElementById('art');
    const txt = document.getElementById('txt');
    const btns = document.getElementById('btns');
    const bgm = document.getElementById('bgm');

    bgm.volume = 0.5;

    // THE MAGIC BOOT FUNCTION
    function bootSystem() {
        // Force audio start on the first human tap
        bgm.play().then(() => {
            splash.style.display = 'none';
            game.style.display = 'block';
            render('start');
        }).catch(e => {
            // If it still fails, we show the game but log the error
            splash.style.display = 'none';
            game.style.display = 'block';
            render('start');
            console.log("Audio Blocked: Ensure Silent Mode is OFF");
        });
    }

    const story = {
        start: { img: 'print_2_play.png', msg: "It started in your bedroom. You've printed your first deck of Factions: Montavera.", choices: [{ h: "Cut the cards with surgical precision", n: 'watch' }] },
        watch: { img: 'watch_others_play.png', msg: "You jump onto the Discord. You watch the veterans move Agents.", choices: [{ h: "Ask for a match", n: 'online' }] },
        online: { img: 'play_online.png', msg: "Your first online match. You win!", choices: [{ h: "Enter Montavera", n: 'gates' }] },
        gates: { img: 'entering_montavera.png', msg: "The bedroom walls fade. You stand before the city gates.", choices: [{ h: "Step into the fog", n: 'encounter' }] },
        encounter: { img: 'start.png', msg: "Someone is approaching. Not a simulation. Face them.", choices: [{ h: "Step forward", n: 'boss' }] },
        boss: { img: 'the_boss.png', msg: "The match begins.", choices: [{ h: "Burn for MOJO (+5)", n: 'win' }] },
        win: { img: 'the_turning_tide.png', msg: "SUCCESS. You have survived the initiation.", choices: [{ h: "CLAIM VICTORY", n: 'ready' }] },
        ready: { img: 'ready_for_more.png', msg: "Report to the Council for your credentials.", choices: [{ h: "ENTER DISCORD", n: 'exit' }] }
    };

    function render(k) {
        if (k === 'exit') { window.location.href = DISCORD; return; }
        const s = story[k];
        btns.innerHTML = '';
        art.style.backgroundImage = `url('${s.img}')`;
        
        txt.innerText = '';
        let i = 0;
        const timer = setInterval(() => {
            txt.innerText += s.msg.charAt(i);
            i++;
            if (i >= s.msg.length) {
                clearInterval(timer);
                s.choices.forEach(c => {
                    const b = document.createElement('button');
                    b.className = 'btn';
                    b.innerText = `> ${c.h}`;
                    b.onclick = () => render(c.n);
                    btns.appendChild(b);
                });
            }
        }, 20);
    }
</script>
</body>
</html>
