<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FACTIONS: MONTAVERA</title>
    <style>
        :root { --p: #7B2CBF; --b: #0D1B2A; --t: #E0E1DD; --g: #00FF9F; --y: #FFD60A; }
        body { background: var(--b); color: var(--t); font-family: 'Courier New', Courier, monospace; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 0; overflow: hidden; position: relative; touch-action: manipulation; }
        
        .cover-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: var(--b); z-index: 100; display: flex; flex-direction: column; justify-content: flex-end; align-items: center; text-align: center; padding-bottom: 8vh; background-repeat: no-repeat; background-position: center top; background-size: contain; }
        #splash { background-image: url('cover_1.png'); display: flex; }
        #back-cover { background-image: url('back_cover_1.png'); display: none; z-index: 200; }

        .cta-btn { position: relative; z-index: 300; border: 3px solid var(--y); color: var(--y); text-align: center; width: 85%; max-width: 320px; background: rgba(0,0,0,0.9); font-weight: 900; font-size: 1.1rem; text-transform: uppercase; letter-spacing: 2px; box-shadow: 0 0 20px rgba(255, 214, 10, 0.4); cursor: pointer; padding: 18px; margin: 6px 0; }
        .hint { position: relative; z-index: 300; font-size: 10px; color: #fff; margin-top: 10px; font-style: italic; background: rgba(0,0,0,0.8); padding: 5px 12px; border-radius: 4px; }

        #game { width: 90%; max-width: 400px; border: 1px solid var(--p); padding: 20px; background: rgba(13, 27, 42, 0.95); display: none; position: relative; z-index: 20; box-shadow: 0 0 15px rgba(123, 44, 191, 0.3); }
        #art { width: 100%; height: 220px; background-size: cover; background-position: center; border: 1px solid var(--p); margin-bottom: 15px; background-color: #000; }
        #txt { min-height: 120px; line-height: 1.4; margin-bottom: 20px; font-size: 14px; }
        .choice-btn { display: block; width: 100%; padding: 12px; margin: 8px 0; background: transparent; border: 1px solid var(--p); color: var(--t); font-family: inherit; cursor: pointer; text-align: left; font-size: 13px; }
    </style>
</head>
<body>

<div id="splash" class="cover-page">
    <button id="boot-btn" class="cta-btn">AUTHORIZE ACCESS</button>
    <div class="hint">Bureaucracy is loading. Stay sharp.</div>
</div>

<div id="back-cover" class="cover-page">
    <button class="cta-btn" onclick="window.location.href='https://discord.gg/sHSN5ke62F'">TILL NEXT TIME...</button>
    <button class="cta-btn" onclick="window.location.href='https://discord.gg/sHSN5ke62F'">OR LAST TIME...</button>
    <div class="hint">Council protocols complete.</div>
</div>

<audio id="bgm" loop preload="auto">
    <source src="https://raw.githubusercontent.com/socialseb83/Montavera-Initiation/main/welcome_to_montavera.mp3" type="audio/mpeg">
</audio>

<div id="game">
    <div id="art"></div>
    <div id="txt"></div>
    <div id="btns"></div>
</div>

<script>
    const story = {
        start: { 
            img: 'initiative.png', 
            msg: "The golden dice tumble. The contested realm awaits. How do you move?", 
            choices: [
                { h: "Roll for high-ground", n: 'gates' },
                { h: "Charge into the fog", n: 'gates' }
            ] 
        },
        gates: { 
            img: 'entering_montavera.png', 
            msg: "The gates of Montavera loom. A figure in a top hat watches from the mist.", 
            choices: [
                { h: "Offer a Bribe (5 MOJO)", n: 'bribe' },
                { h: "Confront the Shadow Enforcer", n: 'enforcer' }
            ] 
        },
        bribe: {
            img: 'the_bribe.png',
            msg: "You slide a glowing pouch across the stones. The Collector pauses.",
            choices: [
                { h: "Seal the deal", n: 'deal' },
                { h: "Ask for a better Agent", n: 'deal' }
            ]
        },
        deal: {
            img: 'the_corrupt_deal.png',
            msg: "A contract is signed in smoke. You gain a powerful ally for the final fight.",
            choices: [
                { h: "Confront the Boss", n: 'boss' },
                { h: "Prepare for the paperwork", n: 'boss' }
            ]
        },
        enforcer: {
            img: 'the_enforcer.png',
            msg: "The Enforcer draws a shadow-blade! You have no credentials here.",
            choices: [
                { h: "Block with a Defender", n: 'failed_block' },
                { h: "Dodge and Counter", n: 'failed_block' }
            ]
        },
        failed_block: {
            img: 'failed_block.png',
            msg: "CRACK! Your Defender is shattered. You're losing MOJO fast.",
            choices: [
                { h: "Desperation move!", n: 'boss' },
                { h: "Rally your remaining cards", n: 'boss' }
            ]
        },
        boss: { 
            img: 'the_boss.png', 
            msg: "The Headmaster arrives. The stakes? Your very citizenship. It's time.", 
            choices: [
                { h: "Burn 'Annihilator Bae'", n: 'burn' },
                { h: "Reveal a Plot Twist", n: 'plot' }
            ] 
        },
        burn: {
            img: 'burn.png',
            msg: "You sacrifice 'Bae' to the void. The power surge is terrifying.",
            choices: [
                { h: "Press the attack!", n: 'near_loss' },
                { h: "Don't look back", n: 'near_loss' }
            ]
        },
        plot: {
            img: 'plot_twist.png',
            msg: "CLASSIFIED! You drop the ultimate paperwork. The contract is void!",
            choices: [
                { h: "Claim Victory", n: 'win' },
                { h: "Sign the win", n: 'win' }
            ]
        },
        near_loss: {
            img: 'the_near_loss.png',
            msg: "He's too strong. You're cornered. Everything is on the line.",
            choices: [
                { h: "One final PUSH", n: 'win' },
                { h: "Risk it all", n: 'win' }
            ]
        },
        win: { 
            img: 'the_turning_tide.png', 
            msg: "The tide turns. The Headmaster retreats. You've survived the initiation.", 
            choices: [
                { h: "Exhale in relief", n: 'ready' },
                { h: "Celebrate your victory", n: 'ready' }
            ] 
        },
        ready: { 
            img: 'ready_for_more.png', 
            msg: "The Council is satisfied. Welcome to the Kontested Realm, Citizen.", 
            choices: [{ h: "CLOSE COMIC", n: 'backcover' }] 
        }
    };

    let isBooted = false;
    function startBoot() {
        if (isBooted) return;
        isBooted = true;
        document.getElementById('bgm').play().catch(() => {});
        document.getElementById('splash').style.display = 'none';
        document.getElementById('game').style.display = 'block';
        render('start');
    }

    document.getElementById('boot-btn').addEventListener('click', startBoot);
    document.getElementById('boot-btn').addEventListener('touchstart', startBoot);

    function render(k) {
        if (k === 'backcover') {
            document.getElementById('game').style.display = 'none';
            document.getElementById('back-cover').style.display = 'flex';
            return;
        }
        const s = story[k];
        const btnsDiv = document.getElementById('btns');
        const txtDiv = document.getElementById('txt');
        btnsDiv.innerHTML = '';
        
        // Direct image call
        document.getElementById('art').style.backgroundImage = `url('${s.img}')`;
        
        let i = 0;
        const timer = setInterval(() => {
            txtDiv.innerText = s.msg.substring(0, i);
            i++;
            if (i > s.msg.length) {
                clearInterval(timer);
                s.choices.forEach(c => {
                    const b = document.createElement('button');
                    b.className = 'choice-btn';
                    b.innerText = `> ${c.h}`;
                    b.onclick = () => render(c.n);
                    btnsDiv.appendChild(b);
                });
            }
        }, 20);
    }
</script>
</body>
</html>
