<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FACTIONS: MONTAVERA</title>
    <style>
        :root { --p: #7B2CBF; --b: #0D1B2A; --t: #E0E1DD; --g: #00FF9F; --y: #FFD60A; --r: #FF4D4D; }
        body { background: var(--b); color: var(--t); font-family: 'Courier New', Courier, monospace; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 0; overflow: hidden; position: relative; touch-action: manipulation; }
        
        .cover-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: var(--b); z-index: 100; display: flex; flex-direction: column; justify-content: flex-end; align-items: center; text-align: center; padding-bottom: 8vh; background-repeat: no-repeat; background-position: center top; background-size: contain; }
        #splash { background-image: url('cover_1.png'); display: flex; }
        #back-cover { background-image: url('back_cover_1.png'); display: none; z-index: 200; }

        .cta-btn { position: relative; z-index: 300; border: 3px solid var(--y); color: var(--y); text-align: center; width: 85%; max-width: 320px; background: rgba(0,0,0,0.9); font-weight: 900; font-size: 1.1rem; text-transform: uppercase; letter-spacing: 2px; box-shadow: 0 0 20px rgba(255, 214, 10, 0.4); cursor: pointer; padding: 18px; margin: 6px 0; }
        .hint { position: relative; z-index: 300; font-size: 10px; color: #fff; margin-top: 10px; font-style: italic; background: rgba(0,0,0,0.8); padding: 5px 12px; border-radius: 4px; }

        #game { width: 90%; max-width: 400px; border: 1px solid var(--p); padding: 20px; background: rgba(13, 27, 42, 0.95); display: none; position: relative; z-index: 20; box-shadow: 0 0 15px rgba(123, 44, 191, 0.3); }
        #art { width: 100%; height: 220px; background-size: cover; background-position: center; border: 1px solid var(--p); margin-bottom: 15px; background-color: #000; }
        #txt { min-height: 120px; line-height: 1.4; margin-bottom: 20px; font-size: 14px; }
        .choice-btn { display: block; width: 100%; padding: 12px; margin: 8px 0; background: transparent; border: 1px solid var(--p); color: var(--t); font-family: inherit; cursor: pointer; text-align: left; font-size: 13px; }
        .choice-btn:hover { background: rgba(123, 44, 191, 0.3); }
    </style>
</head>
<body>

<div id="splash" class="cover-page">
    <button id="boot-btn" class="cta-btn">AUTHORIZE ACCESS</button>
    <div class="hint">Protocol initialized. Check volume.</div>
</div>

<div id="back-cover" class="cover-page">
    <button class="cta-btn" onclick="window.location.href='https://discord.gg/sHSN5ke62F'">TILL NEXT TIME...</button>
    <button class="cta-btn" onclick="window.location.href='https://discord.gg/sHSN5ke62F'">OR LAST TIME...</button>
    <div class="hint">The match is over. The Bureaucracy is forever.</div>
</div>

<audio id="bgm" loop preload="auto">
    <source src="https://raw.githubusercontent.com/socialseb83/Montavera-Initiation/main/welcome_to_montavera.mp3" type="audio/mpeg">
</audio>

<div id="game">
    <div id="art"></div>
    <div id="txt"></div>
    <div id="btns"></div>
</div>

<script>
    const story = {
        start: { 
            img: 'print_2_play.png', 
            msg: "The cards are fresh off the printer. You feel the weight of Montavera in your hands. How do you begin?", 
            choices: [{ h: "Roll for Initiative", n: 'initiative' }] 
        },
        initiative: {
            img: 'initiative.jpg',
            msg: "The golden dice tumble. The Collector watches with a hungry grin. You've won the lead!",
            choices: [{ h: "Step into the city", n: 'gates' }]
        },
        gates: { 
            img: 'entering_montavera.png', 
            msg: "The fog of the city swallows you. Shadows move in the alleyways. A figure steps out.", 
            choices: [
                { h: "Prepare for combat", n: 'encounter' },
                { h: "Offer a Bribe", n: 'bribe' }
            ] 
        },
        bribe: {
            img: 'the bribe.jpg',
            msg: "You slide a pouch of glowing MOJO across the cobbles. The figure pauses. Bureaucracy loves a gift.",
            choices: [{ h: "Request safe passage", n: 'deal' }]
        },
        deal: {
            img: 'the_corrupt_deal.jpg',
            msg: "The Collector leans in. 'A wise Citizen. Take this Agent. You'll need him for what's coming.'",
            choices: [{ h: "Face the Boss", n: 'boss' }]
        },
        encounter: { 
            img: 'the_enforcer.jpg', 
            msg: "A Shadow Enforcer blocks your path! 'Credentials,' he hisses. You have none.", 
            choices: [{ h: "Defend yourself!", n: 'block' }] 
        },
        block: {
            img: 'failed_block.jpg',
            msg: "You play a Defender, but the Enforcer's darkness is too pure. Your block fails!",
            choices: [{ h: "Desperation move...", n: 'boss' }]
        },
        boss: { 
            img: 'the_boss.png', 
            msg: "The Headmaster arrives. The stakes are monsters. You are at your limit.", 
            choices: [
                { h: "Burn 'Annihilator Bae'", n: 'burn' },
                { h: "Play a Plot Twist", n: 'plot' }
            ] 
        },
        burn: {
            img: 'burn.jpg',
            msg: "You feed 'Annihilator Bae' into the void. The MOJO surge is blinding, but the cost is high.",
            choices: [{ h: "Press the advantage", n: 'near_loss' }]
        },
        plot: {
            img: 'plot_twist.jpg',
            msg: "REDACTED! You reveal a classified loophole. The Headmaster is stunned by your paperwork!",
            choices: [{ h: "Claim victory", n: 'win' }]
        },
        near_loss: {
            img: 'the_near_loss.jpg',
            msg: "The monster lunges! You barely sidestep the claws. One hit and it's over...",
            choices: [{ h: "Final Counter-Attack!", n: 'win' }]
        },
        win: { 
            img: 'the_turning_tide.png', 
            msg: "The tide turns. The shadows retreat. You've survived your first match in the contested realm.", 
            choices: [{ h: "CLAIM VICTORY", n: 'ready' }] 
        },
        ready: { 
            img: 'ready_for_more.png', 
            msg: "The Council is waiting. You've proven you have the MOJO to survive.", 
            choices: [{ h: "CLOSE COMIC", n: 'backcover' }] 
        }
    };

    let isBooted = false;
    function startBoot() {
        if (isBooted) return;
        isBooted = true;
        document.getElementById('bgm').play().catch(() => {});
        document.getElementById('splash').style.display = 'none';
        document.getElementById('game').style.display = 'block';
        render('start');
    }

    document.getElementById('boot-btn').addEventListener('click', startBoot);
    document.getElementById('boot-btn').addEventListener('touchstart', startBoot);

    function render(k) {
        if (k === 'backcover') {
            document.getElementById('game').style.display = 'none';
            document.getElementById('back-cover').style.display = 'flex';
            return;
        }
        const s = story[k];
        const btnsDiv = document.getElementById('btns');
        const txtDiv = document.getElementById('txt');
        btnsDiv.innerHTML = '';
        document.getElementById('art').style.backgroundImage = `url('${s.img}')`;
        let i = 0;
        const timer = setInterval(() => {
            txtDiv.innerText = s.msg.substring(0, i);
            i++;
            if (i > s.msg.length) {
                clearInterval(timer);
                s.choices.forEach(c => {
                    const b = document.createElement('button');
                    b.className = 'choice-btn';
                    b.innerText = `> ${c.h}`;
                    b.onclick = () => render(c.n);
                    btnsDiv.appendChild(b);
                });
            }
        }, 20);
    }
</script>
</body>
</html>
