<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FACTIONS: MONTAVERA</title>
    <style>
        :root { --p: #7B2CBF; --b: #0D1B2A; --t: #E0E1DD; --g: #00FF9F; --y: #FFD60A; }
        body { background: var(--b); color: var(--t); font-family: 'Courier New', Courier, monospace; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 0; overflow: hidden; position: relative; touch-action: manipulation; }
        
        .full-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: var(--b); z-index: 100; display: flex; flex-direction: column; justify-content: flex-end; align-items: center; text-align: center; padding-bottom: 5vh; background-size: contain; background-repeat: no-repeat; background-position: center top; }
        .full-screen::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; filter: blur(20px) brightness(0.2); z-index: -1; }

        #splash { background-image: url('cover_1.png'); }
        #splash::before { background-image: url('cover_1.png'); }

        #back-cover { display: none; background-image: url('back_cover_1.jpg'); z-index: 200; }
        #back-cover::before { background-image: url('back_cover_1.jpg'); }

        .cta-btn { position: relative; z-index: 999; border: 3px solid var(--y); color: var(--y); text-align: center; width: 85%; max-width: 320px; background: rgba(0,0,0,0.9); font-weight: 900; font-size: 1.2rem; text-transform: uppercase; letter-spacing: 2px; box-shadow: 0 0 20px rgba(255, 214, 10, 0.4); cursor: pointer; padding: 18px; margin: 8px 0; transition: 0.2s; }
        .cta-btn:hover { background: var(--y); color: var(--b); }
        
        .hint { position: relative; z-index: 999; font-size: 10px; color: #fff; margin-top: 10px; font-style: italic; background: rgba(0,0,0,0.8); padding: 5px 12px; border-radius: 4px; pointer-events: none; }

        #game { width: 90%; max-width: 400px; border: 1px solid var(--p); padding: 20px; background: rgba(13, 27, 42, 0.95); display: none; position: relative; z-index: 20; }
        #art { width: 100%; height: 220px; background-size: cover; background-position: center; border: 1px solid var(--p); margin-bottom: 15px; background-color: #000; }
        #txt { min-height: 120px; line-height: 1.4; white-space: pre-wrap; margin-bottom: 20px; }
        .choice-btn { display: block; width: 100%; padding: 15px; margin: 10px 0; background: transparent; border: 1px solid var(--p); color: var(--t); font-family: inherit; cursor: pointer; text-align: left; }
    </style>
    
    <script>
        const DISCORD = 'https://discord.gg/sHSN5ke62F';
        let isBooted = false;

        window.addEventListener('DOMContentLoaded', () => {
            const bootBtn = document.getElementById('boot-btn');
            const bgm = document.getElementById('bgm');

            const startBoot = () => {
                if (isBooted) return;
                isBooted = true;
                bgm.play().catch(() => {});
                document.getElementById('splash').style.display = 'none';
                document.getElementById('game').style.display = 'block';
                render('start');
            };

            bootBtn.addEventListener('click', startBoot);
            bootBtn.addEventListener('touchstart', startBoot);
        });

        const story = {
            start: { img: 'print_2_play.png', msg: "It started in your bedroom. A printer, cardstock, and a dream. You've printed your first deck.", choices: [{ h: "Cut the cards", n: 'watch' }] },
            watch: { img: 'watch_others_play.png', msg: "You watch the veterans move Agents like they're filing tax returns in a hurricane.", choices: [{ h: "Ask for a match", n: 'online' }] },
            online: { img: 'play_online.png', msg: "Your first win! The MOJO flows.", choices: [{ h: "Enter Montavera", n: 'gates' }] },
            gates: { img: 'entering_montavera.png', msg: "The walls fade. You are now a Citizen.", choices: [{ h: "Step into the fog", n: 'encounter' }] },
            encounter: { img: 'start.png', msg: "Someone approaches. Face them.", choices: [{ h: "Step forward", n: 'boss' }] },
            boss: { img: 'the_boss.png', msg: "CITIZEN. The match begins.", choices: [{ h: "Burn for MOJO", n: 'win' }] },
            win: { img: 'the_turning_tide.png', msg: "SUCCESS. You survived.", choices: [{ h: "CLAIM VICTORY", n: 'ready' }] },
            ready: { img: 'ready_for_more.png', msg: "Report to the Council.", choices: [{ h: "CLOSE COMIC", n: 'backcover' }] }
        };

        function render(k) {
            const bgm = document.getElementById('bgm');
            if (bgm.paused && k !== 'backcover') { bgm.play().catch(() => {}); }
            
            if (k === 'backcover') {
                document.getElementById('game').style.display = 'none';
                document.getElementById('back-cover').style.display = 'flex';
                return;
            }

            const s = story[k];
            const btns = document.getElementById('btns');
            btns.innerHTML = '';
            document.getElementById('art').style.backgroundImage = `url('${s.img}')`;
            
            let i = 0;
            const timer = setInterval(() => {
                document.getElementById('txt').innerText = s.msg.substring(0, i);
                i++;
                if (i > s.msg.length) {
                    clearInterval(timer);
                    s.choices.forEach(c => {
                        const b = document.createElement('button');
                        b.className = 'choice-btn';
                        b.innerText = `> ${c.h}`;
                        b.onclick = () => render(c.n);
                        btns.appendChild(b);
                    });
                }
            }, 20);
        }
    </script>
</head>
<body>

<div id="splash" class="full-screen">
    <button id="boot-btn" class="cta-btn">AUTHORIZE ACCESS</button>
    <div class="hint">Check volume & silent switch</div>
</div>

<div id="back-cover" class="full-screen">
    <button class="cta-btn" onclick="window.location.href=DISCORD">TILL NEXT TIME...</button>
    <button class="cta-btn" onclick="window.location.href=DISCORD">OR LAST TIME...</button>
    <div class="hint">Why don't monsters eat bureaucrats? Because they're hard to digest.</div>
    <p style="font-size: 9px; color: #555; margin-top: 10px;">(Click either to report to the Council Rules)</p>
</div>

<audio id="bgm" loop preload="auto">
    <source src="https://raw.githubusercontent.com/socialseb83/Montavera-Initiation/main/welcome_to_montavera.mp3" type="audio/mpeg">
</audio>

<div id="game">
    <div id="art"></div>
    <div id="txt"></div>
    <div id="btns"></div>
</div>

</body>
</html>
