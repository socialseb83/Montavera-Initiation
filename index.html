<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FACTIONS: MONTAVERA</title>
    <style>
        :root { --p: #7B2CBF; --b: #0D1B2A; --t: #E0E1DD; --y: #FFD60A; }
        body { background: var(--b); color: var(--t); font-family: 'Courier New', Courier, monospace; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 0; overflow: hidden; position: relative; touch-action: manipulation; }
        .cover-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: var(--b); z-index: 100; display: flex; flex-direction: column; justify-content: flex-end; align-items: center; text-align: center; padding-bottom: 8vh; background-repeat: no-repeat; background-position: center top; background-size: contain; }
        #splash { background-image: url('cover_1.png'); display: flex; }
        #back-cover { background-image: url('back_cover_1.png'); display: none; z-index: 200; }
        .cta-btn { position: relative; z-index: 300; border: 3px solid var(--y); color: var(--y); text-align: center; width: 85%; max-width: 320px; background: rgba(0,0,0,0.9); font-weight: 900; font-size: 1.1rem; text-transform: uppercase; letter-spacing: 2px; box-shadow: 0 0 20px rgba(255, 214, 10, 0.4); cursor: pointer; padding: 18px; margin: 6px 0; }
        .hint { position: relative; z-index: 300; font-size: 10px; color: #fff; margin-top: 10px; font-style: italic; background: rgba(0,0,0,0.8); padding: 5px 12px; border-radius: 4px; }
        #game { width: 90%; max-width: 400px; border: 1px solid var(--p); padding: 20px; background: rgba(13, 27, 42, 0.95); display: none; position: relative; z-index: 20; box-shadow: 0 0 15px rgba(123, 44, 191, 0.3); }
        #art { width: 100%; height: 220px; background-size: cover; background-position: center; border: 1px solid var(--p); margin-bottom: 15px; background-color: #000; }
        #txt { min-height: 110px; line-height: 1.4; margin-bottom: 20px; font-size: 13px; }
        .choice-btn { display: block; width: 100%; padding: 12px; margin: 8px 0; background: transparent; border: 1px solid var(--p); color: var(--t); font-family: inherit; cursor: pointer; text-align: left; font-size: 12px; }
    </style>
</head>
<body>

<div id="splash" class="cover-page">
    <button id="boot-btn" class="cta-btn">AUTHORIZE ACCESS</button>
    <div class="hint">Check volume. Handshake protocol active.</div>
</div>

<div id="back-cover" class="cover-page">
    <button class="cta-btn" onclick="window.location.href='https://discord.gg/sHSN5ke62F'">REPORT TO COUNCIL</button>
    <div class="hint">Back cover: Review the Rules.</div>
</div>

<audio id="bgm" loop preload="auto">
    <source src="https://raw.githubusercontent.com/socialseb83/Montavera-Initiation/main/welcome_to_montavera.mp3" type="audio/mpeg">
</audio>

<div id="game">
    <div id="art"></div>
    <div id="txt"></div>
    <div id="btns"></div>
</div>

<script>
    const story = {
        // 2. Boy with Printer
        start: { img: 'print_2_play.png', msg: "It started in your bedroom. A printer, cardstock, and a dream. You've printed your first deck of Factions: Montavera.", choices: [{ h: "Cut the cards", n: 'watch' }, { h: "Tear them out", n: 'watch' }] },
        
        // 3. Boy watching games on the internet
        watch: { img: 'watch_others_play.png', msg: "You jump onto the Discord. You watch the veterans move Agents like they're filing tax returns in a hurricane.", choices: [{ h: "Study the meta", n: 'play_online' }, { h: "Learn the plays", n: 'play_online' }] },
        
        // 4. Boy plays online on his computer against an opponent
        play_online: { img: 'play_online.png', msg: "Time to test your MOJO. You log in and challenge your first opponent. The digital battlefield glows with potential.", choices: [{ h: "Commit to the play", n: 'city' }, { h: "Ready your hand", n: 'city' }] },
        
        // 5. Boy enters the city of Montavera
        city: { img: 'entering_montavera.png', msg: "The bedroom walls fade. You head into the city of Montavera, searching for a real, flesh-and-blood opponent. The fog is thick.", choices: [{ h: "Enter the street", n: 'oldman' }, { h: "Find a match", n: 'oldman' }] },
        
        // 6. Boy encounters creepy old man in foggy street
        oldman: { img: 'the_boss.png', msg: "In the heart of the fog, you encounter your first real enemy. A creepy old man with a hungry grin. 'Ready to lose, boy?'", choices: [{ h: "Sit at the table", n: 'summon_enforcer' }, { h: "Challenge him", n: 'summon_enforcer' }] },
        
        // 7. Old man summons the Enforcer
        summon_enforcer: { img: 'the_enforcer.png', msg: "He doesn't waste time. He summons a Shadow Enforcer! The air in the street turns ice cold.", choices: [{ h: "Steady your nerves", n: 'corrupt_deal' }, { h: "Grip your cards", n: 'corrupt_deal' }] },
        
        // 8. Old man offers a corrupt deal
        corrupt_deal: { img: 'the_corrupt_deal.png', msg: "He sneers. 'A deal? Hand over your deck, and I'll let you walk away.'", choices: [{ h: "Refuse the bribe", n: 'summon_bae' }, { h: "Declare war", n: 'summon_bae' }] },
        
        // 9. Boy summons Annihilator Bae
        summon_bae: { img: 'start.png', msg: "You summon 'Annihilator Bae'! She glows with a fierce, defiant light. The counter-attack begins.", choices: [{ h: "Ready combat stance", n: 'roll' }, { h: "Analyze the field", n: 'roll' }] },
        
        // 10. They roll dice for Initiative
        roll: { img: 'initiative.png', msg: "The golden dice tumble across the cobbles. You need a high roll to take the lead.", choices: [{ h: "Watch the dice land", n: 'devoured' }, { h: "Hope for a crit", n: 'devoured' }] },
        
        // 11. Old man wins / monster attacks / Near Loss
        devoured: { img: 'the_near_loss.png', msg: "Disaster! The old man wins the roll. His monster lunges, dealing a devastating blow to 'Annihilator Bae.'", choices: [{ h: "Gasp in horror", n: 'turning_tide' }, { h: "Search for hope...", n: 'turning_tide' }] },
        
        // 12. Boy plays Turning Tide
        turning_tide: { img: 'the_turning_tide.png', msg: "But the game isn't over. You play 'The Turning Tide'! The battlefield shifts in your favor.", choices: [{ h: "Seize the moment", n: 'seat_attack' }, { h: "Press the advantage", n: 'seat_attack' }] },
        
        // 13. Attack seat / Fail Block (Part 1)
        seat_attack: { img: 'failed_block.png', msg: "Enraged, the old man orders his monster to attack YOU directly! You command your agent to block.", choices: [{ h: "Hold the line!", n: 'failed_block_res' }, { h: "Brace for impact", n: 'failed_block_res' }] },
        
        // 13. Fail Block (Part 2)
        failed_block_res: { img: 'failed_block.png', msg: "FAIL! Your agent is a striker, not a blocker. The hit lands. You're bleeding MOJO.", choices: [{ h: "Find an answer", n: 'burn_card' }, { h: "One last trick...", n: 'burn_card' }] },
        
        // 14. Burn card for MOJO
        burn_card: { img: 'burn.png', msg: "You realize the weakened 'Bae' is better used as fuel. You burn her card for a massive MOJO surge!", choices: [{ h: "Channel the energy", n: 'bribe_enforcer' }, { h: "Pay the price", n: 'bribe_enforcer' }] },
        
        // 15. Bribe the Enforcer
        bribe_enforcer: { img: 'the_bribe.png', msg: "You use the MOJO to bribe his Enforcer! You slide a green sack of power across the table.", choices: [{ h: "Buy his loyalty", n: 'plot_twist' }, { h: "Turn the tables", n: 'plot_twist' }] },
        
        // 16. Activate Plot Twist / Defeat Old Man
        plot_twist: { img: 'plot_twist.png', msg: "With the Enforcer distracted, you activate your Plot Twist! The Headmaster's contract is shredded!", choices: [{ h: "DECLARE VICTORY", n: 'window_yell' }, { h: "CLAIM THE WIN", n: 'window_yell' }] },
        
        // 17. Bedroom Yell
        window_yell: { img: 'ready_for_more.png', msg: "Back in your bedroom, you yell out the window: 'I'M READY, MONTAVERA! LET'S DO THIS!'", choices: [{ h: "CLOSE COMIC", n: 'backcover' }] }
    };

    let isBooted = false;
    function startBoot() {
        if (isBooted) return;
        isBooted = true;
        document.getElementById('bgm').play().catch(() => {});
        document.getElementById('splash').style.display = 'none';
        document.getElementById('game').style.display = 'block';
        render('start');
    }

    document.getElementById('boot-btn').addEventListener('click', startBoot);
    document.getElementById('boot-btn').addEventListener('touchstart', startBoot);

    function render(k) {
        if (k === 'backcover') {
            document.getElementById('game').style.display = 'none';
            document.getElementById('back-cover').style.display = 'flex';
            return;
        }
        const s = story[k];
        const btnsDiv = document.getElementById('btns');
        const txtDiv = document.getElementById('txt');
        btnsDiv.innerHTML = '';
        document.getElementById('art').style.backgroundImage = `url('${s.img}')`;
        let i = 0;
        const timer = setInterval(() => {
            txtDiv.innerText = s.msg.substring(0, i);
            i++;
            if (i > s.msg.length) {
                clearInterval(timer);
                s.choices.forEach(c => {
                    const b = document.createElement('button');
                    b.className = 'choice-btn';
                    b.innerText = `> ${c.h}`;
                    b.onclick = () => render(c.n);
                    btnsDiv.appendChild(b);
                });
            }
        }, 20);
    }
</script>
</body>
</html>
