<script>
    const DISCORD_LINK = 'YOUR_DISCORD_RULES_LINK'; 

    let mojo = 0;
    const terminal = document.getElementById('terminal-text');
    const options = document.getElementById('options-zone');
    const artBox = document.getElementById('art-box');
    const statsBar = document.getElementById('stats-bar');

    const story = {
        start: {
            image: 'print_2_play.png',
            text: "It started in your bedroom. A printer, some heavy cardstock, and a dream of bureaucratic dominance. You've printed your first deck of Factions: Montavera.\n\nWhat's the next step, Citizen?",
            action: () => { statsBar.style.opacity = '0'; }, // Hide stats in real world
            choices: [
                { text: "Cut the cards with surgical precision", next: 'watch_scene' },
                { text: "Tear them out like a chaotic anomaly", next: 'watch_scene' }
            ]
        },
        watch_scene: {
            image: 'watch_others_play.png',
            text: "You jump onto the Discord. You watch the veterans move Agents and trigger Plot Twists like they're filing tax returns in a hurricane. \n\nYou think to yourself: 'I can do this. I have the paperwork.'",
            choices: [
                { text: "Ask for a practice match", next: 'online_match' },
                { text: "Quietly observe the madness", next: 'online_match' }
            ]
        },
        online_match: {
            image: 'play_online.png',
            text: "Your first online match against a friend. The screen glows. The MOJO flows. You win your first game and the confidence feels like a gravitational shift. You're ready for the real thing.",
            choices: [
                { text: "Venturing out into Montavera...", next: 'city_gates' }
            ]
        },
        city_gates: {
            image: 'entering_montavera.png',
            text: "The bedroom walls fade. The air smells like burnt paper and ozone. You stand before the city gates. \n\nYou are no longer just a player. You are a Citizen.",
            choices: [
                { text: "Step into the fog", next: 'first_encounter' }
            ]
        },
        first_encounter: {
            image: 'start.png',
            text: "You are not ready.\n\nBut that has never stopped anyone in Montavera.\n\n—\n\nSomeone is approaching.\n\nNot a tutorial. Not a simulation. A real opponent has entered Montavera.\n\nThey are waiting.",
            action: () => { statsBar.style.opacity = '1'; }, // Mojo appears
            choices: [
                { text: "Step forward and face them", next: 'the_match' }
            ]
        },
        the_match: {
            image: 'the_boss.png',
            text: "CITIZEN. You slam 'Annhialator Bae' onto the table. The match officially begins. This is where your training ends and the anomaly takes over.",
            choices: [
                { text: "Burn for MOJO (+5)", next: 'burn_path' },
                { text: "Set a Plot Twist", next: 'plot_path' }
            ]
        },
        burn_path: {
            image: 'burn.png',
            text: "Power surge. +5 MOJO. \n\nThe Collector sneers. He plays 'The Enforcer'. A massive shadow looms over your Frontline.",
            action: () => { updateMojo(5); },
            choices: [
                { text: "Try to Block the Enforcer", next: 'block_fail' },
                { text: "Bribe the Enforcer (-3 MOJO)", next: 'bribe_move' }
            ]
        },
        plot_path: {
            image: 'plot_twist.png',
            text: "A hidden trap. The Collector doesn't see it—he's too busy laughing while he plays 'The Enforcer'. He strikes your Seat!",
            choices: [
                { text: "Attempt to Block", next: 'block_fail' }
            ]
        },
        block_fail: {
            image: 'failed_block.png',
            text: "ERROR. You try to block with a Producer, but it has no combat stats. The Enforcer walks right through your defense. Your Seat is smoking.",
            choices: [
                { text: "Seek a deal", next: 'the_deal' }
            ]
        },
        bribe_move: {
            image: 'the_bribe.png',
            text: "Gold talks. The Enforcer steps aside. Now, roll for Initiative to strike first!",
            action: () => { updateMojo(-3); },
            choices: [
                { text: "[ROLL D6]", next: 'roll_init' }
            ]
        },
        the_deal: {
            image: 'the_corrupt_deal.png',
            text: "The Collector leans in. 'I'll call off the strike, kid. Just hand over control of your Agent. Sign here.'",
            choices: [
                { text: "Refuse (Take the damage)", next: 'near_loss' },
                { text: "Accept (Lose your unit)", next: 'near_loss' }
            ]
        },
        roll_init: {
            image: 'initiative.png',
            text: "A '6' flashes! You act first. But wait—The Collector plays a secret Redaction card to delete your play!",
            action: () => { document.body.classList.add('glitch'); setTimeout(()=>document.body.classList.remove('glitch'), 500); },
            choices: [
                { text: "Turn the Tide!", next: 'win_sequence' }
            ]
        },
        near_loss: {
            image: 'the_near_loss.png',
            text: "Everything is fading. The Collector is preparing the final paperwork to end your existence.\n\nWait—the hidden Plot Twist!",
            choices: [
                { text: "FLIP IT!", next: 'win_sequence' }
            ]
        },
        win_sequence: {
            image: 'the_turning_tide.png',
            text: "SUCCESS. Your Plot Twist finds a loophole in reality. The Enforcer is deleted. The Collector retreats. You have survived the initiation.",
            choices: [
                { text: "CLAIM VICTORY", next: 'final_screen' }
            ]
        },
        final_screen: {
            image: 'ready_for_more.png',
            text: "You're ready, Montavera! The city is yours to conquer. Report to the Council for your final credentials.",
            choices: [
                { text: "ENTER DISCORD (#SERVER-RULES)", next: 'exit' }
            ]
        }
    };

    function typeWriter(text, callback) {
        terminal.innerText = '';
        let i = 0;
        const interval = setInterval(() => {
            terminal.innerText += text.charAt(i);
            i++;
            if (i >= text.length) {
                clearInterval(interval);
                callback();
            }
        }, 20);
    }

    function renderScene(key) {
        if (key === 'exit') {
            window.location.href = DISCORD_LINK;
            return;
        }
        const scene = story[key];
        options.innerHTML = '';
        if (scene.image) {
            artBox.style.backgroundImage = `url('${scene.image}')`;
        }
        if (scene.action) scene.action();
        typeWriter(scene.text, () => {
            scene.choices.forEach(c => {
                const b = document.createElement('button');
                b.className = 'btn';
                b.innerText = `> ${c.text}`;
                b.onclick = () => renderScene(c.next);
                options.appendChild(b);
            });
        });
    }

    function updateMojo(amt) {
        mojo += amt;
        document.getElementById('mojo-val').innerText = mojo;
    }

    renderScene('start');
</script>
