<body>

<div id="game">
    <div style="margin-bottom:10px; font-size:10px; color:var(--g);">AUDIO MANIFEST:</div>
    <audio id="bgm" loop controls style="width:100%; height:30px; margin-bottom:15px;">
        <source src="https://raw.githubusercontent.com/socialseb83/Montavera-Initiation/main/welcome_to_montavera.mp3" type="audio/mpeg">
    </audio>

    <div id="art"></div>
    <div id="txt"></div>
    <div id="btns"></div>
</div>

<script>
    const DISCORD = 'https://discord.gg/sHSN5ke62F'; 
    const art = document.getElementById('art');
    const txt = document.getElementById('txt');
    const btns = document.getElementById('btns');
    const bgm = document.getElementById('bgm');

    bgm.volume = 0.5;

    function render(k) {
        // Force attempt
        bgm.play().catch(e => console.log("Manual play required on this device."));
        
        if (k === 'exit') { window.location.href = DISCORD; return; }
        const s = story[k];
        btns.innerHTML = '';
        art.style.backgroundImage = `url('${s.img}')`;
        
        txt.innerText = '';
        let i = 0;
        const timer = setInterval(() => {
            txt.innerText += s.msg.charAt(i);
            i++;
            if (i >= s.msg.length) {
                clearInterval(timer);
                s.choices.forEach(c => {
                    const b = document.createElement('button');
                    b.className = 'btn';
                    b.innerText = `> ${c.h}`;
                    b.onclick = () => render(c.n);
                    btns.appendChild(b);
                });
            }
        }, 20);
    }
    
    // The story object remains the same as before
    const story = {
        start: { img: 'print_2_play.png', msg: "It started in your bedroom. You've printed your first deck of Factions: Montavera.", choices: [{ h: "Cut the cards", n: 'watch' }] },
        watch: { img: 'watch_others_play.png', msg: "You jump onto the Discord. You watch the veterans move Agents.", choices: [{ h: "Ask for a match", n: 'online' }] },
        online: { img: 'play_online.png', msg: "Your first online match. You win!", choices: [{ h: "Enter Montavera", n: 'gates' }] },
        gates: { img: 'entering_montavera.png', msg: "You stand before the city gates.", choices: [{ h: "Step into the fog", n: 'encounter' }] },
        encounter: { img: 'start.png', msg: "Someone is approaching. Face them.", choices: [{ h: "Step forward", n: 'boss' }] },
        boss: { img: 'the_boss.png', msg: "The match begins.", choices: [{ h: "Burn for MOJO", n: 'win' }] },
        win: { img: 'the_turning_tide.png', msg: "SUCCESS. You survived.", choices: [{ h: "CLAIM VICTORY", n: 'ready' }] },
        ready: { img: 'ready_for_more.png', msg: "Report to the Council.", choices: [{ h: "ENTER DISCORD", n: 'exit' }] }
    };

    render('start');
</script>
</body>
