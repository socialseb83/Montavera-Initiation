<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FACTIONS: MONTAVERA</title>
    <style>
        :root { --p: #7B2CBF; --b: #0D1B2A; --t: #E0E1DD; --g: #00FF9F; --y: #FFD60A; }
        body { background: var(--b); color: var(--t); font-family: 'Courier New', Courier, monospace; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 0; overflow: hidden; position: relative; touch-action: manipulation; }
        
        /* COVER LAYERS */
        .cover-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: var(--b); z-index: 100; display: flex; flex-direction: column; justify-content: flex-end; align-items: center; text-align: center; padding-bottom: 8vh; }
        .cover-img { position: absolute; top: 0; left: 0; width: 100%; height: 80%; background-size: contain; background-repeat: no-repeat; background-position: center top; z-index: 110; pointer-events: none; }

        #splash { display: flex; }
        #back-cover { display: none; z-index: 200; }

        .cta-btn { position: relative; z-index: 300; border: 3px solid var(--y); color: var(--y); text-align: center; width: 85%; max-width: 320px; background: rgba(0,0,0,0.9); font-weight: 900; font-size: 1.1rem; text-transform: uppercase; letter-spacing: 2px; box-shadow: 0 0 20px rgba(255, 214, 10, 0.4); cursor: pointer; padding: 18px; margin: 6px 0; }
        .hint { position: relative; z-index: 300; font-size: 10px; color: #fff; margin-top: 10px; font-style: italic; background: rgba(0,0,0,0.8); padding: 5px 12px; border-radius: 4px; }

        /* GAMEPLAY UI */
        #game { width: 90%; max-width: 400px; border: 1px solid var(--p); padding: 20px; background: rgba(13, 27, 42, 0.95); display: none; position: relative; z-index: 20; box-shadow: 0 0 15px rgba(123, 44, 191, 0.3); }
        #art { width: 100%; height: 220px; background-size: cover; background-position: center; border: 1px solid var(--p); margin-bottom: 15px; background-color: #000; }
        #txt { min-height: 100px; line-height: 1.4; margin-bottom: 20px; font-size: 14px; }
        .choice-btn { display: block; width: 100%; padding: 12px; margin: 8px 0; background: transparent; border: 1px solid var(--p); color: var(--t); font-family: inherit; cursor: pointer; text-align: left; font-size: 13px; }
    </style>
</head>
<body>

<div id="splash" class="cover-page">
    <div class="cover-img" style="background-image: url('cover_1.png');"></div>
    <button id="boot-btn" class="cta-btn">AUTHORIZE ACCESS</button>
    <div class="hint">Check volume & silent switch</div>
</div>

<div id="back-cover" class="cover-page">
    <div class="cover-img" style="background-image: url('back_cover_1.png');"></div>
    <button class="cta-btn" onclick="window.location.href='https://discord.gg/sHSN5ke62F'">TILL NEXT TIME...</button>
    <button class="cta-btn" onclick="window.location.href='https://discord.gg/sHSN5ke62F'">OR LAST TIME...</button>
    <div class="hint">Bureaucracy: The only monster that grows when you cut it in half.</div>
</div>

<audio id="bgm" loop preload="auto">
    <source src="https://raw.githubusercontent.com/socialseb83/Montavera-Initiation/main/welcome_to_montavera.mp3" type="audio/mpeg">
</audio>

<div id="game">
    <div id="art"></div>
    <div id="txt"></div>
    <div id="btns"></div>
</div>

<script>
    const story = {
        start: { 
            img: 'print_2_play.png', 
            msg: "It started in your bedroom. A printer, cardstock, and a dream. You've printed your first deck of Factions: Montavera.", 
            choices: [{ h: "Cut the cards with surgical precision", n: 'watch' }, { h: "Tear them out (Chaotic Anomaly)", n: 'watch' }] 
        },
        watch: { 
            img: 'watch_others_play.png', 
            msg: "You jump onto the Discord. You watch the veterans move Agents like they're filing tax returns in a hurricane.", 
            choices: [{ h: "Ask for a practice match", n: 'online' }] 
        },
        online: { 
            img: 'play_online.png', 
            msg: "Your first online match. You win! Confidence shift detected.", 
            choices: [{ h: "Venturing out into Montavera...", n: 'gates' }] 
        },
        gates: { 
            img: 'entering_montavera.png', 
            msg: "The bedroom walls fade. You stand before the city gates. You are now a Citizen.", 
            choices: [{ h: "Step into the fog", n: 'encounter' }] 
        },
        encounter: { 
            img: 'start.png', 
            msg: "You are not ready. But that has never stopped anyone. Face your opponent.", 
            choices: [{ h: "Step forward", n: 'boss' }] 
        },
        boss: { 
            img: 'the_boss.png', 
            msg: "CITIZEN. Your opponent is relentless. You hold the line.", 
            choices: [
                { h: "Burn 'Annhialator Bae' for MOJO (+5)", n: 'win_mojo' },
                { h: "Trigger a Plot Twist loophole", n: 'win_plot' }
            ] 
        },
        win_mojo: { 
            img: 'the_turning_tide.png', 
            msg: "The MOJO surge is overwhelming! You overpower their defenses with raw energy and secure the win.", 
            choices: [{ h: "CLAIM VICTORY", n: 'ready' }] 
        },
        win_plot: { 
            img: 'the_turning_tide.png', 
            msg: "Loophole found! Your Plot Twist unravels their strategy in a single bureaucratic masterstroke.", 
            choices: [{ h: "CLAIM VICTORY", n: 'ready' }] 
        },
        ready: { 
            img: 'ready_for_more.png', 
            msg: "You're ready, Citizen! Report to the Council for your final credentials.", 
            choices: [{ h: "CLOSE COMIC", n: 'backcover' }] 
        }
    };

    let isBooted = false;
    function startBoot() {
        if (isBooted) return;
        isBooted = true;
        document.getElementById('bgm').play().catch(() => {});
        document.getElementById('splash').style.display = 'none';
        document.getElementById('game').style.display = 'block';
        render('start');
    }

    document.getElementById('boot-btn').addEventListener('click', startBoot);
    document.getElementById('boot-btn').addEventListener('touchstart', startBoot);

    function render(k) {
        if (k === 'backcover') {
            document.getElementById('game').style.display = 'none';
            document.getElementById('back-cover').style.display = 'flex';
            return;
        }
        const s = story[k];
        const btnsDiv = document.getElementById('btns');
        const txtDiv = document.getElementById('txt');
        btnsDiv.innerHTML = '';
        document.getElementById('art').style.backgroundImage = `url('${s.img}')`;
        let i = 0;
        const timer = setInterval(() => {
            txtDiv.innerText = s.msg.substring(0, i);
            i++;
            if (i > s.msg.length) {
                clearInterval(timer);
                s.choices.forEach(c => {
                    const b = document.createElement('button');
                    b.className = 'choice-btn';
                    b.innerText = `> ${c.h}`;
                    b.onclick = () => render(c.n);
                    btnsDiv.appendChild(b);
                });
            }
        }, 20);
    }
</script>
</body>
</html>
