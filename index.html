<style>
    :root { --p: #7B2CBF; --b: #0D1B2A; --t: #E0E1DD; --g: #00FF9F; --y: #FFD60A; }
    
    body { 
        background: var(--b); 
        color: var(--t); 
        font-family: 'Courier New', Courier, monospace; 
        display: flex; 
        justify-content: center; 
        align-items: center; 
        min-height: 100vh; 
        margin: 0; 
        padding: 0; 
        overflow: hidden; 
        position: relative; 
    }

    /* THE COMIC BOOK COVER PAGE */
    #splash { 
        position: fixed; 
        top: 0; left: 0; width: 100%; height: 100%; 
        background-color: var(--b); 
        z-index: 100; 
        display: flex; 
        flex-direction: column; 
        justify-content: flex-end; /* Pushes content to the bottom */
        align-items: center; 
        text-align: center; 
        padding-bottom: 6vh; /* Dynamic spacing for small screens */
    }

    /* Background Blur Effect */
    #splash::before {
        content: "";
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        background-image: url('cover_1.png');
        background-size: cover;
        background-position: center;
        filter: blur(20px) brightness(0.2);
        z-index: -1;
    }

    /* The Main Image - Scaled for better button clearance */
    #cover-art {
        position: absolute;
        top: 2vh; left: 0; width: 100%; height: 70%; 
        background-image: url('cover_1.png');
        background-size: contain;
        background-repeat: no-repeat;
        background-position: center top;
        z-index: 1;
    }

    /* BIGGER, GLOWING BUTTON */
    #boot-btn { 
        position: relative;
        z-index: 10;
        border: 3px solid var(--y); 
        color: var(--y); 
        text-align: center; 
        width: 85%; /* Scales with screen width */
        max-width: 320px;
        background: rgba(0,0,0,0.9); 
        font-weight: 900; 
        font-size: 1.4rem; /* Larger text */
        text-transform: uppercase;
        letter-spacing: 3px;
        box-shadow: 0 0 30px rgba(255, 214, 10, 0.5);
        cursor: pointer;
        padding: 20px;
        animation: pulse 2s infinite; /* Make it move! */
    }

    @keyframes pulse {
        0% { box-shadow: 0 0 15px rgba(255, 214, 10, 0.4); transform: scale(1); }
        50% { box-shadow: 0 0 35px rgba(255, 214, 10, 0.7); transform: scale(1.02); }
        100% { box-shadow: 0 0 15px rgba(255, 214, 10, 0.4); transform: scale(1); }
    }

    .hint { 
        position: relative;
        z-index: 10;
        font-size: 11px; color: #fff; margin-top: 15px; font-style: italic; 
        background: rgba(0,0,0,0.8); padding: 6px 15px; border-radius: 4px; 
    }

    #game { width: 90%; max-width: 400px; border: 1px solid var(--p); padding: 20px; background: rgba(13, 27, 42, 0.95); display: none; z-index: 20; }
</style>

<body>

<div id="splash">
    <div id="cover-art"></div>
    <button id="boot-btn" onclick="bootSystem()">AUTHORIZE ACCESS</button>
    <div class="hint">Ensure volume is UP for audio</div>
</div>
