<style>
    :root { --p: #7B2CBF; --b: #0D1B2A; --t: #E0E1DD; --g: #00FF9F; --y: #FFD60A; }
    
    body { 
        background: var(--b); 
        color: var(--t); 
        font-family: 'Courier New', Courier, monospace; 
        display: flex; 
        justify-content: center; 
        align-items: center; 
        min-height: 100vh; 
        margin: 0; 
        padding: 0; 
        overflow: hidden; 
        position: relative; 
    }

    /* THE COMIC BOOK COVER PAGE */
    #splash { 
        position: fixed; 
        top: 0; left: 0; width: 100%; height: 100%; 
        background-color: var(--b); 
        z-index: 100; 
        display: flex; 
        flex-direction: column; 
        justify-content: flex-end; 
        align-items: center; 
        text-align: center; 
        padding-bottom: 40px;
    }

    /* Background Blur Effect to fill the gaps */
    #splash::before {
        content: "";
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        background-image: url('cover_1.png');
        background-size: cover;
        background-position: center;
        filter: blur(15px) brightness(0.3);
        z-index: -1;
    }

    /* The Main Image - SET TO CONTAIN */
    #cover-art {
        position: absolute;
        top: 0; left: 0; width: 100%; height: 85%; /* Leaves room for button at bottom */
        background-image: url('cover_1.png');
        background-size: contain; /* ENTIRE IMAGE WILL SHOW */
        background-repeat: no-repeat;
        background-position: center top;
        z-index: 1;
    }

    #game { width: 90%; max-width: 400px; border: 1px solid var(--p); padding: 20px; background: rgba(13, 27, 42, 0.95); box-shadow: 0 0 15px rgba(123, 44, 191, 0.3); display: none; position: relative; z-index: 20; }
    
    #boot-btn { 
        position: relative;
        z-index: 10;
        border: 2px solid var(--y); 
        color: var(--y); 
        text-align: center; 
        width: 280px; 
        background: rgba(0,0,0,0.9); 
        font-weight: bold; 
        font-size: 1.1rem; 
        letter-spacing: 2px;
        box-shadow: 0 0 25px rgba(255, 214, 10, 0.6);
        cursor: pointer;
        padding: 15px;
    }

    .hint { 
        position: relative;
        z-index: 10;
        font-size: 10px; color: #fff; margin-top: 10px; font-style: italic; 
        background: rgba(0,0,0,0.8); padding: 4px 12px; border-radius: 4px; 
    }
</style>

<body>

<div id="splash">
    <div id="cover-art"></div>
    <button id="boot-btn" onclick="bootSystem()">AUTHORIZE ACCESS</button>
    <div class="hint">Check volume & silent switch</div>
</div>
