<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Montavera Initiation</title>
    <style>
        :root { --p: #7B2CBF; --b: #0D1B2A; --t: #E0E1DD; --g: #00FF9F; }
        body { background: var(--b); color: var(--t); font-family: monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        #game { width: 90%; max-width: 400px; border: 1px solid var(--p); padding: 20px; background: rgba(13,27,42,0.9); box-shadow: 0 0 10px var(--p); }
        #art { width: 100%; height: 200px; background-size: cover; background-position: center; border: 1px solid var(--p); margin-bottom: 10px; }
        #txt { min-height: 100px; line-height: 1.4; white-space: pre-wrap; margin-bottom: 20px; }
        .btn { display: block; width: 100%; padding: 10px; margin: 5px 0; background: transparent; border: 1px solid var(--p); color: var(--t); cursor: pointer; text-align: left; }
        .btn:hover { background: var(--p); color: #fff; }
    </style>
</head>
<body>
<div id="game">
    <div id="art"></div>
    <div id="txt"></div>
    <div id="btns"></div>
</div>
<script>
    const DISCORD = 'https://discord.gg/your-link'; // REPLACE THIS
    const art = document.getElementById('art');
    const txt = document.getElementById('txt');
    const btns = document.getElementById('btns');

    const story = {
        start: { img: 'print_2_play.png', msg: "It started in your bedroom. You've printed your first deck of Factions: Montavera.", choices: [{ h: "Cut the cards", n: 'watch' }] },
        watch: { img: 'watch_others_play.png', msg: "You watch the veterans on Discord. You think: 'I can do this.'", choices: [{ h: "Ask for a match", n: 'online' }] },
        online: { img: 'play_online.png', msg: "Your first online win. You're ready for the real thing.", choices: [{ h: "Enter Montavera", n: 'gates' }] },
        gates: { img: 'entering_montavera.png', msg: "The walls fade. You stand before the city gates.", choices: [{ h: "Step into the fog", n: 'encounter' }] },
        encounter: { img: 'start.png', msg: "You are not ready. But that never stopped anyone. Face your opponent.", choices: [{ h: "Face them", n: 'end' }] },
        end: { img: 'ready_for_more.png', msg: "Welcome to Montavera.", choices: [{ h: "Join Discord", n: 'exit' }] }
    };

    function render(k) {
        if (k === 'exit') { window.location.href = DISCORD; return; }
        const s = story[k];
        btns.innerHTML = '';
        art.style.backgroundImage = `url('${s.img}')`;
        txt.innerText = s.msg;
        s.choices.forEach(c => {
            const b = document.createElement('button');
            b.className = 'btn';
            b.innerText = `> ${c.h}`;
            b.onclick = () => render(c.n);
            btns.appendChild(b);
        });
    }
    render('start');
</script>
</body>
</html>
