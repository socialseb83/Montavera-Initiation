<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FACTIONS: MONTAVERA</title>
    <style>
        :root { --p: #7B2CBF; --b: #0D1B2A; --t: #E0E1DD; --y: #FFD60A; }
        body { background: var(--b); color: var(--t); font-family: 'Courier New', Courier, monospace; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 0; overflow: hidden; position: relative; touch-action: manipulation; }
        
        .cover-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: var(--b); z-index: 100; display: flex; flex-direction: column; justify-content: flex-end; align-items: center; text-align: center; padding-bottom: 8vh; }
        .cover-img { position: absolute; top: 0; left: 0; width: 100%; height: 80%; object-fit: contain; z-index: 110; }

        #splash { display: flex; }
        #back-cover { display: none; z-index: 200; }

        .cta-btn { position: relative; z-index: 300; border: 3px solid var(--y); color: var(--y); text-align: center; width: 85%; max-width: 320px; background: rgba(0,0,0,0.9); font-weight: 900; font-size: 1.1rem; text-transform: uppercase; letter-spacing: 2px; box-shadow: 0 0 20px rgba(255, 214, 10, 0.4); cursor: pointer; padding: 18px; margin: 6px 0; }
        .hint { position: relative; z-index: 300; font-size: 10px; color: #fff; margin-top: 10px; font-style: italic; background: rgba(0,0,0,0.8); padding: 5px 12px; border-radius: 4px; }

        #game { width: 90%; max-width: 400px; border: 1px solid var(--p); padding: 20px; background: rgba(13, 27, 42, 0.95); display: none; position: relative; z-index: 20; box-shadow: 0 0 15px rgba(123, 44, 191, 0.3); }
        #art-container { width: 100%; height: 220px; border: 1px solid var(--p); margin-bottom: 15px; background-color: #000; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        #game-img { width: 100%; height: 100%; object-fit: cover; }
        #txt { min-height: 110px; line-height: 1.4; margin-bottom: 20px; font-size: 13px; }
        .choice-btn { display: block; width: 100%; padding: 12px; margin: 8px 0; background: transparent; border: 1px solid var(--p); color: var(--t); font-family: inherit; cursor: pointer; text-align: left; font-size: 12px; }
    </style>
</head>
<body>

<div id="splash" class="cover-page">
    <img src="1_cover_1.png" class="cover-img">
    <button id="boot-btn" class="cta-btn">AUTHORIZE ACCESS</button>
    <div class="hint">Handshake protocol active.</div>
</div>

<div id="back-cover" class="cover-page">
    <img src="18_back_cover_1.png" class="cover-img">
    <button class="cta-btn" onclick="window.location.href='https://discord.gg/sHSN5ke62F'">REPORT TO COUNCIL</button>
    <div class="hint">Protocol complete.</div>
</div>

<audio id="bgm" loop preload="auto">
    <source src="https://raw.githubusercontent.com/socialseb83/Montavera-Initiation/main/welcome_to_montavera.mp3" type="audio/mpeg">
</audio>

<div id="game">
    <div id="art-container">
        <img id="game-img" src="">
    </div>
    <div id="txt"></div>
    <div id="btns"></div>
</div>
